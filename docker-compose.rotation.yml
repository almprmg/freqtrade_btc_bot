# Multi-asset rotation bot — holds the strongest of BTC/ETH/SOL/BNB.
# Reads pre-computed rotation_signal.feather (run compute_rotation_signal.py
# periodically on the server to refresh).

services:
  freqtrade_rotation:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_rotation
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.rotation.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_rotation.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_rotation.sqlite
      --config /freqtrade/config.json --strategy BtcRotationStrategy
    networks: [default, trad_system_trad]

  freqtrade_rotation_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_rotation_bridge
    restart: unless-stopped
    depends_on: [freqtrade_rotation]
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_ROTATION_SUB}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_rotation.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

networks:
  trad_system_trad:
    external: true
