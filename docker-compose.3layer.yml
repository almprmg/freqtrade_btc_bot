# Freqtrade BTC/USDT 3-Layer bot — dry-run on Binance Spot.
# Default mode L3_AGGR_WIDE_GRID (winner of the 16-variant 5-year sweep at +99.6%).
# Includes a sidecar bridge that mirrors Freqtrade trades into trad_pg so
# the admin dashboard shows them under subscription BRIDGE_SUBSCRIPTION_ID.

services:
  freqtrade_3layer:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_3layer
    restart: unless-stopped
    environment:
      L3_MODE: ${FREQTRADE_L3_MODE:-L3_AGGR_WIDE_GRID}
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.3layer.json:/freqtrade/config.3layer.json:ro
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade_3layer.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_3layer.sqlite
      --config /freqtrade/config.3layer.json
      --strategy Btc3LayerStrategy
    networks:
      - default
      - trad_system_trad

  freqtrade_3layer_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_3layer_bridge
    restart: unless-stopped
    depends_on:
      - freqtrade_3layer
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_3LAYER_SUBSCRIPTION_ID}
      BRIDGE_USER_ID: ${BRIDGE_3LAYER_USER_ID}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_3layer.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes:
      - ./user_data:/data/freqtrade:ro
    networks:
      - default
      - trad_system_trad

networks:
  trad_system_trad:
    external: true
