# Calendar Shield bot — AI Shield V2 + calendar tilts.
# Backtest +38.2%/yr vs V2's +36.5%.

services:
  freqtrade_calendar:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_calendar
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.calendar.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_calendar.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_calendar.sqlite
      --config /freqtrade/config.json --strategy BtcCalendarShieldStrategy
    networks: [default, trad_system_trad]

  freqtrade_calendar_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_calendar_bridge
    restart: unless-stopped
    depends_on: [freqtrade_calendar]
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_CALENDAR_SUB}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_calendar.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

networks:
  trad_system_trad:
    external: true
