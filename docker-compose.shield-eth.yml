# ETH Pure Shield — bear protection for ETH bot.
# Backtest +47%/yr vs DynRebal +21%/yr. Adversarial WARN (acceptable).

services:
  freqtrade_eth_shield:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_eth_shield
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.shield-ETH.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_eth_shield.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_shield_eth.sqlite
      --config /freqtrade/config.json --strategy BtcRegimeShieldStrategy
    networks: [default, trad_system_trad]

  freqtrade_eth_shield_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_eth_shield_bridge
    restart: unless-stopped
    depends_on: [freqtrade_eth_shield]
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_ETH_SHIELD_SUB}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_shield_eth.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

networks:
  trad_system_trad:
    external: true
