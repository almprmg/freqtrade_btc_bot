    container_name: freqtrade_btc_quantum_ai_bridge
    restart: unless-stopped
    depends_on: [freqtrade_btc_quantum_ai]
    environment:
      BRIDGE_SUBSCRIPTION_ID: 113
      BRIDGE_USER_ID: 10
