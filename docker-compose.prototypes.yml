      POLL_INTERVAL_SECONDS: 30
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

  # ============ #112 BTC AnalogShield V1 ============
  freqtrade_btc_analog_shield:
