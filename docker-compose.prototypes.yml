  freqtrade_btc_calendar_v2_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_btc_calendar_v2_bridge
    restart: unless-stopped
    depends_on: [freqtrade_btc_calendar_v2]
    environment:
      BRIDGE_SUBSCRIPTION_ID: 111
      BRIDGE_USER_ID: 10
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_btc_calendar_v2.sqlite
