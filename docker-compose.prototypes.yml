      --config /freqtrade/config.json --strategy BtcAnalogShieldStrategy
    networks: [default, trad_system_trad]

  freqtrade_btc_analog_shield_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_btc_analog_shield_bridge
    restart: unless-stopped
