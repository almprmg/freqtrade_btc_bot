# Prototype subscriptions #109-#113 — promoted from shelf 2026-06-09.
# 5 strategies with proven CAGR >= 30%, previously only tested, now deployed.

services:

  # ============ #109 BTC AnalogV2 ============
  freqtrade_btc_analogv2:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_btc_analogv2
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.analogv2.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_btc_analogv2.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_btc_analogv2.sqlite
      --config /freqtrade/config.json --strategy BtcAnalogV2Strategy
    networks: [default, trad_system_trad]

  freqtrade_btc_analogv2_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_btc_analogv2_bridge
    restart: unless-stopped
    depends_on: [freqtrade_btc_analogv2]
    environment:
      BRIDGE_SUBSCRIPTION_ID: 109
      BRIDGE_USER_ID: 10
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_btc_analogv2.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: 30
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

  # ============ #110 ETH AnalogV2 ⭐ STAR ============
  freqtrade_eth_analogv2:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_eth_analogv2
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.analogv2-ETH.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_eth_analogv2.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_eth_analogv2.sqlite
      --config /freqtrade/config.json --strategy BtcAnalogV2Strategy
    networks: [default, trad_system_trad]

  freqtrade_eth_analogv2_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_eth_analogv2_bridge
    restart: unless-stopped
    depends_on: [freqtrade_eth_analogv2]
    environment:
      BRIDGE_SUBSCRIPTION_ID: 110
      BRIDGE_USER_ID: 10
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_eth_analogv2.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: 30
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

  # ============ #111 BTC Calendar V2 ============
  freqtrade_btc_calendar_v2:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_btc_calendar_v2
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
      CAL_W_JUL: "-0.05"
      CAL_W_JAN: "0.10"
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.calv2.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_btc_calendar_v2.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_btc_calendar_v2.sqlite
      --config /freqtrade/config.json --strategy BtcCalendarV2Strategy
