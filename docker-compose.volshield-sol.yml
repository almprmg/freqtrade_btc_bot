# SOL Volatility-Aware Shield — passes Adversarial WARN after 3 failed variants.
# Backtest +45%/yr vs DynRebal +40%/yr, 0% in 2022 bear (vs -87%).

services:
  freqtrade_sol_vol_shield:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_sol_vol_shield
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.volshield-SOL.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_sol_vol_shield.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_vol_shield_sol.sqlite
      --config /freqtrade/config.json --strategy SolVolShieldStrategy
    networks: [default, trad_system_trad]

  freqtrade_sol_vol_shield_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_sol_vol_shield_bridge
    restart: unless-stopped
    depends_on: [freqtrade_sol_vol_shield]
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_SOL_VOL_SHIELD_SUB}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_vol_shield_sol.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

networks:
  trad_system_trad:
    external: true
