# Freqtrade BTC/USDT Regime Shield bot — exits to cash on confirmed bear.
# Default mode RS_AGGR (winner of 5-mode 6-year sweep: +24.5%/yr compound,
# worst year -13% — 3x better than Adaptive on compound returns).

services:
  freqtrade_shield:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_shield
    restart: unless-stopped
    environment:
      RS_MODE: ${FREQTRADE_RS_MODE:-RS_AGGR}
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.shield.json:/freqtrade/config.shield.json:ro
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade_shield.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_shield.sqlite
      --config /freqtrade/config.shield.json
      --strategy BtcRegimeShieldStrategy
    networks:
      - default
      - trad_system_trad

  freqtrade_shield_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_shield_bridge
    restart: unless-stopped
    depends_on:
      - freqtrade_shield
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_SHIELD_SUBSCRIPTION_ID}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_shield.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes:
      - ./user_data:/data/freqtrade:ro
    networks:
      - default
      - trad_system_trad

networks:
  trad_system_trad:
    external: true
