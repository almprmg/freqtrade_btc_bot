# AI Shield V2 — sigmoid halving sizing. Backtest +36.6%/yr vs V1's +26.7%.

services:
  freqtrade_ai_shield_v2:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_ai_shield_v2
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.ai_shield_v2.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_ai_shield_v2.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_ai_shield_v2.sqlite
      --config /freqtrade/config.json --strategy BtcAiShieldV2Strategy
    networks: [default, trad_system_trad]

  freqtrade_ai_shield_v2_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_ai_shield_v2_bridge
    restart: unless-stopped
    depends_on: [freqtrade_ai_shield_v2]
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_AI_SHIELD_V2_SUB}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_ai_shield_v2.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

networks:
  trad_system_trad:
    external: true
