# BNB Calendar Shield — Calendar Shield ported to BNB.
# Backtest +52%/yr (vs live RegimeShield 52%) but bear -1.5% (vs -20%). Adversarial PASS.

services:
  freqtrade_bnb_calendar:
    image: freqtradeorg/freqtrade:2026.4
    container_name: freqtrade_bnb_calendar
    restart: unless-stopped
    environment:
      FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY:-}
      FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET:-}
    volumes:
      - ./user_data:/freqtrade/user_data
      - ./config.calendar-BNB.json:/freqtrade/config.json:ro
    command: >
      trade --logfile /freqtrade/user_data/logs/freqtrade_bnb_calendar.log
      --db-url sqlite:////freqtrade/user_data/tradesv3_calendar_bnb.sqlite
      --config /freqtrade/config.json --strategy BtcCalendarShieldStrategy
    networks: [default, trad_system_trad]

  freqtrade_bnb_calendar_bridge:
    image: freqtrade-bridge:latest
    container_name: freqtrade_bnb_calendar_bridge
    restart: unless-stopped
    depends_on: [freqtrade_bnb_calendar]
    environment:
      BRIDGE_SUBSCRIPTION_ID: ${BRIDGE_BNB_CALENDAR_SUB}
      BRIDGE_USER_ID: ${BRIDGE_USER_ID:-10}
      FREQTRADE_SQLITE_PATH: /data/freqtrade/tradesv3_calendar_bnb.sqlite
      TRAD_PG_DSN: ${TRAD_PG_DSN}
      POLL_INTERVAL_SECONDS: ${BRIDGE_POLL_INTERVAL:-30}
    volumes: [./user_data:/data/freqtrade:ro]
    networks: [default, trad_system_trad]

networks:
  trad_system_trad:
    external: true
